services:
  mongo:
    image: mongo:7
    container_name: opay_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: opay_db
    networks:
      - opay_network

  backend:
    build:
      context: ./backend
    container_name: opay_backend
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      - mongo
    env_file:
      - ./.env
    networks:
      - opay_network
    # Wait-for-Mongo script (ensures DB is ready before starting backend)
    entrypoint: ["./wait-for-it.sh", "mongo:27017", "--", "./server"]

  frontend:
    build:
      context: ./frontend
    container_name: opay_frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - backend
    networks:
      - opay_network

volumes:
  mongo_data:

networks:
  opay_network:
    driver: bridge